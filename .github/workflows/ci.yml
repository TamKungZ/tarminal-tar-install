name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-check:
    name: Rust check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: |
          cargo check -p tar-install --lib
          cargo check -p tar-install --bin tar-install
          cargo check -p tarminal

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  cli-smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build release binaries
        run: |
          cargo build --release -p tar-install --bin tar-install
          cargo build --release -p tarminal

      - name: Test basic CLI
        run: |
          ./target/release/tar-install || true
          ./target/release/tarminal --help
          ./target/release/tarminal list || true

      - name: Create test tarball
        run: |
          set -eux

          WORK="$(mktemp -d)"
          mkdir -p "$WORK/helloapp-0.1.0-linux-x64"

          cat > "$WORK/helloapp-0.1.0-linux-x64/helloapp" <<'SH'
          #!/usr/bin/env bash
          echo "hello from helloapp"
          SH

          chmod +x "$WORK/helloapp-0.1.0-linux-x64/helloapp"

          tar -C "$WORK" -cJf /tmp/helloapp-0.1.0-linux-x64.tar.xz helloapp-0.1.0-linux-x64

          cat > /tmp/helloapp.tarapp.yml <<'YAML'
          id: helloapp
          name: HelloApp
          version: 0.1.0
          exec: helloapp
          command: helloapp
          desktop:
            categories:
              - Utility
            terminal: true
          YAML

      - name: Test inspect/install/remove
        run: |
          set -eux

          ./target/release/tarminal inspect /tmp/helloapp-0.1.0-linux-x64.tar.xz

          ./target/release/tarminal install /tmp/helloapp-0.1.0-linux-x64.tar.xz \
            --recipe /tmp/helloapp.tarapp.yml

          ~/.local/bin/helloapp

          ./target/release/tarminal list
          ./target/release/tarminal doctor helloapp || true
          ./target/release/tarminal remove helloapp

  os-test:
    name: OS test / ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-bookworm
            container: debian:bookworm
          - name: fedora-latest
            container: fedora:latest

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Install OS dependencies
        shell: bash
        run: |
          set -eux

          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y curl ca-certificates git build-essential pkg-config libssl-dev xz-utils tar
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y curl ca-certificates git gcc gcc-c++ make pkgconf-pkg-config openssl-devel xz tar
          else
            echo "Unsupported container OS"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        shell: bash
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build and test
        shell: bash
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"

          cargo build -p tar-install --lib
          cargo build -p tar-install --bin tar-install
          cargo build -p tarminal
          cargo test --workspace

      - name: CLI smoke
        shell: bash
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"

          cargo build --release -p tar-install --bin tar-install
          cargo build --release -p tarminal

          ./target/release/tar-install || true
          ./target/release/tarminal --help
          ./target/release/tarminal list || true

  package-smoke:
    name: Package smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          cargo install cargo-deb cargo-generate-rpm

      - name: Build release
        run: |
          cargo build --release -p tar-install --bin tar-install
          cargo build --release -p tarminal
          strip -s target/release/tar-install
          strip -s target/release/tarminal

      - name: Build deb packages
        run: |
          cargo deb -p tar-install
          cargo deb -p tarminal
          ls -lah target/debian
          dpkg -I target/debian/*.deb
          dpkg -c target/debian/*.deb

      - name: Build rpm packages
        run: |
          cargo generate-rpm -p crates/tar-install
          cargo generate-rpm -p crates/tarminal
          ls -lah target/generate-rpm
          rpm -qpi target/generate-rpm/*.rpm
          rpm -qpl target/generate-rpm/*.rpm

      - name: Test deb install
        run: |
          sudo apt install -y ./target/debian/tar-install_*.deb
          sudo apt install -y ./target/debian/tarminal_*.deb

          which tar-install
          which tarminal

          tar-install || true
          tarminal --help
          tarminal list || true

          sudo apt remove -y tarminal tar-install