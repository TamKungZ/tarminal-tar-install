name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-linux-x64:
    name: Release Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm gnupg
          cargo install cargo-deb cargo-generate-rpm

      - name: Build release binaries
        run: |
          set -eux

          cargo build --release -p tar-install --bin tar-install
          cargo build --release -p tarminal

          strip -s target/release/tar-install
          strip -s target/release/tarminal

      - name: Build deb packages
        run: |
          set -eux

          cargo deb -p tar-install
          cargo deb -p tarminal

      - name: Build rpm packages
        run: |
          set -eux

          cargo generate-rpm -p crates/tar-install
          cargo generate-rpm -p crates/tarminal

      - name: Prepare dist
        run: |
          set -eux

          mkdir -p dist

          cp target/release/tar-install dist/tar-install-linux-x64
          cp target/release/tarminal dist/tarminal-linux-x64

          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/

          tar -C dist -cJf dist/tar-install-linux-x64.tar.xz tar-install-linux-x64
          tar -C dist -cJf dist/tarminal-linux-x64.tar.xz tarminal-linux-x64

          cd dist
          sha256sum * > SHA256SUMS

      - name: Import GPG key
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -eux
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - name: GPG sign artifacts
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -eux

          for file in dist/*; do
            if [ -f "$file" ] && [ "${file##*.}" != "asc" ]; then
              if [ -n "${GPG_PASSPHRASE:-}" ]; then
                gpg --batch --yes \
                  --pinentry-mode loopback \
                  --passphrase "$GPG_PASSPHRASE" \
                  --armor \
                  --detach-sign "$file"
              else
                gpg --batch --yes \
                  --armor \
                  --detach-sign "$file"
              fi
            fi
          done

      - name: Verify signatures
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        run: |
          set -eux

          for sig in dist/*.asc; do
            file="${sig%.asc}"
            gpg --verify "$sig" "$file"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tarminal-linux-x64-release
          path: dist/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux

          TAG="${GITHUB_REF_NAME}"

          gh release create "$TAG" dist/* \
            --title "Tarminal ${TAG}" \
            --notes "Release ${TAG}"