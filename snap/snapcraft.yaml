name: tarminal
base: core22
version: '0.1.4'
title: Tarminal
summary: Install Linux app tarballs into desktop-friendly locations
description: |
  Tarminal is a CLI frontend for tar-install.

  It installs Linux app tarballs into desktop-friendly user locations by creating
  app directories, command wrappers, desktop entries, icons, install state, and
  clean uninstall support.

  This snap is packaged as classic because Tarminal manages applications in the
  user's normal host desktop environment and needs access to host user paths.

license: MIT
contact: https://github.com/TamKungZ/tarminal-tar-install/issues
issues: https://github.com/TamKungZ/tarminal-tar-install/issues
source-code: https://github.com/TamKungZ/tarminal-tar-install
website: https://packages.tamkungz.me/apps/tarminal/

grade: stable
confinement: classic
compression: xz

platforms:
  amd64:

apps:
  tarminal:
    command: bin/tarminal
  tar-install:
    command: bin/tar-install

parts:
  tarminal:
    plugin: rust
    source: .
    rust-channel: stable
    override-build: |
      cargo build --release --locked
      install -Dm755 target/release/tarminal $CRAFT_PART_INSTALL/bin/tarminal
      install -Dm755 target/release/tar-install $CRAFT_PART_INSTALL/bin/tar-install
    stage:
      - bin/tarminal
      - bin/tar-install