name: tarminal
base: core22
version: '0.2.0'
title: Tarminal
summary: Install Linux app tarballs as desktop apps
description: |
  Tarminal installs Linux application tarballs as proper desktop apps.

  It can install an app into a desktop-friendly location, create a command
  wrapper, create a desktop menu entry, install an icon, track install state,
  and remove it cleanly later.

  This snap is packaged as classic because Tarminal manages applications in the
  user's normal host desktop environment.

license: MIT
contact: https://github.com/TamKungZ/tarminal-tar-install/issues
issues: https://github.com/TamKungZ/tarminal-tar-install/issues
source-code: https://github.com/TamKungZ/tarminal-tar-install
website: https://packages.tamkungz.me/apps/tarminal/

grade: stable
confinement: classic
compression: xz

platforms:
  amd64:

apps:
  tarminal:
    command: bin/tarminal
  tar-install:
    command: bin/tar-install

parts:
  tarminal:
    plugin: rust
    source: .
    rust-channel: stable
    override-build: |
      cargo build --release --locked
      install -Dm755 target/release/tarminal $CRAFT_PART_INSTALL/bin/tarminal
      install -Dm755 target/release/tar-install $CRAFT_PART_INSTALL/bin/tar-install
    stage:
      - bin/tarminal
      - bin/tar-install
