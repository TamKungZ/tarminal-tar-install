app-id: me.tamkungz.Tarminal
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: tarminal
branch: stable

finish-args:
  - --filesystem=home

modules:
  - name: tarminal
    buildsystem: simple
    build-commands:
      - install -Dm755 target/release/tarminal /app/bin/tarminal
      - install -Dm755 target/release/tar-install /app/bin/tar-install
      - install -Dm644 flatpak/me.tamkungz.Tarminal.metainfo.xml /app/share/metainfo/me.tamkungz.Tarminal.metainfo.xml
      - install -Dm644 flatpak/me.tamkungz.Tarminal.desktop /app/share/applications/me.tamkungz.Tarminal.desktop
    sources:
      - type: dir
        path: ..